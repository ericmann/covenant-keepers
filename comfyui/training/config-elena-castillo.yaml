# AI-Toolkit LoRA Training Config — Elena Castillo
#
# Usage: python run.py config/config-elena-castillo.yaml

---
job: lora
config:
  name: "elena-castillo-lora"
  process:
    - type: "sd_trainer"
      training_folder: "output"
      device: "cuda:0"
      network:
        type: "lora"
        linear: 32          # rank
        linear_alpha: 16     # alpha = rank / 2
      save:
        dtype: "float16"
        save_every: 250
        max_step_saves_to_keep: 3
      datasets:
        - folder_path: "datasets/elena-castillo"
          caption_ext: ".txt"
          caption_dropout_rate: 0.05
          shuffle_tokens: false
          cache_latents_to_disk: true
          resolution:
            - 768
            - 1024
      train:
        batch_size: 1
        steps: 3000           # ~12 epochs with 15 images x 15 repeats
        gradient_accumulation_steps: 1
        train_unet: true
        train_text_encoder: false
        gradient_checkpointing: true
        noise_scheduler: "flowmatch"
        optimizer: "adamw8bit"
        lr: 1.0e-4
        lr_scheduler: "cosine"
        lr_scheduler_params:
          T_max: 3000
          eta_min: 1.0e-6
      model:
        name_or_path: "black-forest-labs/FLUX.1-dev"
        is_flux: true
        quantize: false       # DGX Spark has plenty of memory
      sample:
        sampler: "flowmatch"
        sample_every: 250
        width: 768
        height: 1024
        prompts:
          - "elena_castillo, 10-year-old Latina girl running through a field, warm brown skin, dark brown ponytail flying behind her, bright red t-shirt, athletic shorts, gap-toothed grin, vintage illustration style"
          - "elena_castillo, 10-year-old Latina girl sitting on a stone wall with arms crossed, warm brown skin, dark brown sharp eyes, braided friendship bracelet, skinned knees, vintage illustration style"
          - "elena_castillo, 10-year-old Latina girl examining an ancient artifact with intense curiosity, warm brown skin, loose strands of hair escaping ponytail, half-grin, vintage illustration style"
      trigger_word: "elena_castillo"
