# AI-Toolkit LoRA Training Config — Abuelo Castillo
#
# Usage: python run.py config/config-abuelo-castillo.yaml

---
job: lora
config:
  name: "abuelo-castillo-lora"
  process:
    - type: "sd_trainer"
      training_folder: "output"
      device: "cuda:0"
      network:
        type: "lora"
        linear: 32          # rank
        linear_alpha: 16     # alpha = rank / 2
      save:
        dtype: "float16"
        save_every: 250
        max_step_saves_to_keep: 3
      datasets:
        - folder_path: "datasets/abuelo-castillo"
          caption_ext: ".txt"
          caption_dropout_rate: 0.05
          shuffle_tokens: false
          cache_latents_to_disk: true
          resolution:
            - 768
            - 1024
      train:
        batch_size: 1
        steps: 3000           # ~12 epochs with 15 images x 15 repeats
        gradient_accumulation_steps: 1
        train_unet: true
        train_text_encoder: false
        gradient_checkpointing: true
        noise_scheduler: "flowmatch"
        optimizer: "adamw8bit"
        lr: 1.0e-4
        lr_scheduler: "cosine"
        lr_scheduler_params:
          T_max: 3000
          eta_min: 1.0e-6
      model:
        name_or_path: "black-forest-labs/FLUX.1-dev"
        is_flux: true
        quantize: false       # DGX Spark has plenty of memory
      sample:
        sampler: "flowmatch"
        sample_every: 250
        width: 768
        height: 1024
        prompts:
          - "abuelo_castillo, elderly Latino man in his 70s standing in a study surrounded by books, deep brown weathered skin, thick white hair swept back, half-moon gold-rimmed reading glasses, rumpled linen shirt with rolled sleeves, vintage illustration style"
          - "abuelo_castillo, elderly Latino man sitting at a desk writing in a journal, deep brown weathered skin, white silver hair, warm sharp eyes, leather-banded wristwatch, calloused hands, vintage illustration style"
          - "abuelo_castillo, elderly Latino man leaning on a cane in a doorway smiling warmly, deep brown skin with laugh lines, thick white hair, half-moon glasses, khaki trousers, leather sandals, vintage illustration style"
      trigger_word: "abuelo_castillo"
